<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인공지능 동물상 테스트</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-selector">
            <button id="light-theme-btn" class="theme-btn">Light</button>
            <button id="dark-theme-btn" class="theme-btn">Dark</button>
            <button id="system-theme-btn" class="theme-btn">System</button>
        </div>
        
        <header>
            <h1>인공지능 동물상 테스트</h1>
            <p class="subtitle">나는 강아지상일까, 고양이상일까?</p>
        </header>

        <main>
            <div id="upload-area" class="upload-box">
                <button type="button" class="start-btn" onclick="init()">카메라 시작하기</button>
                <div id="webcam-container"></div>
                <div id="label-container"></div>
            </div>
        </main>

        <section class="contact-section">
            <hr>
            <h3>제휴 문의</h3>
            <form action="https://formspree.io/f/xnjganvk" method="POST" id="contact-form">
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용" required></textarea>
                </div>
                <button type="submit" class="submit-btn">보내기</button>
            </form>
        </section>

        <section class="comments-section">
            <hr>
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://productbilder.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
