<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 유틸리티 포털</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-selector">
            <button id="theme-toggle-btn" class="theme-btn">다크 모드로 전환</button>
        </div>
        
        <header>
            <h1>AI 유틸리티 포털</h1>
            <p class="subtitle">원하시는 서비스를 선택하세요</p>
        </header>

        <nav class="service-nav">
            <button id="nav-lotto-btn" class="nav-btn active">로또 번호 추천</button>
            <button id="nav-animal-btn" class="nav-btn">동물상 테스트</button>
        </nav>

        <main id="main-content">
            <!-- Lotto Section -->
            <section id="lotto-section" class="content-section active">
                <div class="card">
                    <h2>행운의 로또 번호</h2>
                    <p>인공지능이 추천하는(?) 행운의 번호를 받아보세요.</p>
                    <button id="generator-btn" class="action-btn">번호 생성하기</button>
                    <div id="numbers-container"></div>
                </div>
            </section>

            <!-- Animal Section -->
            <section id="animal-section" class="content-section">
                <div class="card">
                    <h2>동물상 테스트</h2>
                    <p>강아지상일까, 고양이상일까? 분석 방법을 선택하세요.</p>
                    
                    <div class="animal-options">
                        <button type="button" class="option-btn" onclick="startCamera()">실시간 카메라</button>
                        <div class="file-upload-wrapper">
                            <label for="file-upload" class="option-btn">사진 파일 업로드</label>
                            <input id="file-upload" type="file" accept="image/*" onchange="handleFileUpload(event)" style="display:none;">
                        </div>
                    </div>

                    <div id="webcam-container"></div>
                    <div id="image-preview-container">
                        <img id="image-preview" src="#" alt="미리보기" style="display:none; max-width: 100%; border-radius: 12px;">
                    </div>
                    <div id="label-container"></div>
                </div>
            </section>
        </main>

        <section class="contact-section">
            <hr>
            <h3>제휴 문의</h3>
            <form action="https://formspree.io/f/xnjganvk" method="POST" id="contact-form">
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용" required></textarea>
                </div>
                <button type="submit" class="submit-btn">보내기</button>
            </form>
        </section>

        <section class="comments-section">
            <hr>
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://productbilder.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>서비스를 이용하시려면 자바스크립트를 활성화해주세요.</noscript>
        </section>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
